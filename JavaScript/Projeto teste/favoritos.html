<!-- ========================= FAVORITOS.HTML ========================= -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Favoritos</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

  <!-- HEADER -->
  <header>

    <!-- LOGO -->
    <div class="logo-area">

      <img src="img/bookr.png" alt="Folha Viva">

      <h2>Folha Viva</h2>

    </div>

    <!-- MENU -->
    <div class="header-menu">

      <a href="#">
        <i class="fa-solid fa-house"></i>
      </a>

      <a href="carrinho.html">
        <i class="fa-solid fa-cart-shopping"></i>
      </a>

      <a href="#">
        <i class="fa-solid fa-shield"></i>
      </a>

      <a href="favoritos.html">
        <i class="fa-solid fa-heart active-heart"></i>
      </a>

    </div>

  </header>

  <!-- FORMAS -->
  <div class="top-shape"></div>
  <div class="bottom-shape"></div>

  <main>

    <!-- TÍTULO -->
    <div class="title-area">

      <h1>Favoritos</h1>
      <p>Olá, Nome do usuário</p>

    </div>

    <!-- LIVROS -->
    <section class="books-grid">

      <!-- POWERLESS -->
      <div class="book-card">

        <div class="book-image">
          <img src="img/powerless.png" alt="Powerless">
        </div>

        <div class="book-content">

          <div class="book-info">

            <div>
              <h2>Powerless</h2>
              <span>R$ 40,00</span>
            </div>

            <div class="icons">

              <a href="carrinho.html">
                <i class="fa-solid fa-cart-shopping"></i>
              </a>

              <i class="fa-solid fa-heart remove-book"></i>

            </div>

          </div>

          <a href="carrinho.html">
            <button>Comprar</button>
          </a>

        </div>

      </div>

      <!-- MELHOR DO QUE NOS FILMES -->
      <div class="book-card">

        <div class="book-image">
          <img src="img/Melhor do que nos filmes.png" alt="Melhor do que nos filmes">
        </div>

        <div class="book-content">

          <div class="book-info">

            <div>
              <h2>Melhor do que nos filmes</h2>
              <span>R$ 35,00</span>
            </div>

            <div class="icons">

              <a href="carrinho.html">
                <i class="fa-solid fa-cart-shopping"></i>
              </a>

              <i class="fa-solid fa-heart remove-book"></i>

            </div>

          </div>

          <a href="carrinho.html">
            <button>Comprar</button>
          </a>

        </div>

      </div>

      <!-- GUERRA DA PAPOULA -->
      <div class="book-card">

        <div class="book-image">
          <img src="img/Guerra da Papoula.png" alt="Guerra da Papoula">
        </div>

        <div class="book-content">

          <div class="book-info">

            <div>
              <h2>Guerra da Papoula</h2>
              <span>R$ 52,00</span>
            </div>

            <div class="icons">

              <a href="carrinho.html">
                <i class="fa-solid fa-cart-shopping"></i>
              </a>

              <i class="fa-solid fa-heart remove-book"></i>

            </div>

          </div>

          <a href="carrinho.html">
            <button>Comprar</button>
          </a>

        </div>

      </div>

      <!-- TEMPESTADE DE ÔNIX -->
      <div class="book-card">

        <div class="book-image">
          <img src="img/Tempestada de Ônix.png" alt="Tempestade de Ônix">
        </div>

        <div class="book-content">

          <div class="book-info">

            <div>
              <h2>Tempestade de Ônix</h2>
              <span>R$ 60,00</span>
            </div>

            <div class="icons">

              <a href="carrinho.html">
                <i class="fa-solid fa-cart-shopping"></i>
              </a>

              <i class="fa-solid fa-heart remove-book"></i>

            </div>

          </div>

          <a href="carrinho.html">
            <button>Comprar</button>
          </a>

        </div>

      </div>

    </section>

  </main>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
